<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectra · Spectraloop</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --col:#1e6eff; --glow:rgba(30,110,255,.4); --bg:#050515; }
    html,body { width:100%; height:100%; background:var(--bg);
      font-family:'Courier New',Courier,monospace; color:#fff; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image: linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);
      background-size:48px 48px; }
    body::after { content:''; position:fixed; inset:0; z-index:999; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,
        rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px); }
    .scan-beam { position:fixed; left:0; right:0; height:5px; z-index:998;
      pointer-events:none;
      background:linear-gradient(transparent,rgba(0,212,255,.05),transparent);
      animation:scan 9s linear infinite; }
    @keyframes scan { 0%{top:-5px} 100%{top:100vh} }
    @keyframes crt  { 0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.96} 94%{opacity:1} }
    #app { animation:crt 9s infinite; }
    @keyframes glitch {
      0%  {transform:translate(0);         clip-path:none;}
      18% {transform:translate(-3px,1px);  clip-path:inset(8% 0 84% 0);}
      36% {transform:translate(3px,-1px);  clip-path:inset(43% 0 41% 0);}
      54% {transform:translate(-2px,2px);  clip-path:inset(78% 0 7% 0);}
      72% {transform:translate(1px,0);     clip-path:none;}
      100%{transform:translate(0);         clip-path:none;}
    }
    .glitch { animation:glitch .26s steps(1) forwards; }
    #app { position:relative; z-index:1; display:flex; flex-direction:column;
      width:100vw; height:100vh; }
    header { flex-shrink:0; display:flex; align-items:center;
      justify-content:space-between; padding:11px 32px 9px;
      border-bottom:1px solid rgba(30,110,255,.16);
      background:linear-gradient(180deg,rgba(5,5,20,.92) 0%,transparent 100%); }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand-name { font-size:15px; font-weight:bold; letter-spacing:5px;
      color:#fff; text-shadow:0 0 16px rgba(255,255,255,.25); }
    .brand-sub  { font-size:9px; letter-spacing:3px; color:#4a5a70; }
    .center-title { text-align:center; }
    .center-title h1 { font-size:30px; font-weight:bold; letter-spacing:14px;
      color:#fff; text-shadow:0 0 32px rgba(255,255,255,.2); }
    .center-title p  { font-size:10px; letter-spacing:4px; color:#4a5a70; margin-top:3px; }
    .badge { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .badge-main { font-size:14px; font-weight:bold; letter-spacing:4px;
      color:#fff; text-shadow:0 0 14px rgba(255,255,255,.2); }
    .badge-sub  { font-size:9px; letter-spacing:3px; color:#4a5a70; }
    .content { flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px; min-height:0; }
    .face-wrap { position:relative; flex-shrink:0; width:380px; height:380px; }
    .face-wrap::before,.face-wrap::after,.face-inner::before,.face-inner::after {
      content:''; position:absolute; width:22px; height:22px;
      border-color:var(--col); border-style:solid; transition:border-color .5s; z-index:2; }
    .face-wrap::before  { top:-6px;    left:-6px;    border-width:2px 0 0 2px; }
    .face-wrap::after   { top:-6px;    right:-6px;   border-width:2px 2px 0 0; }
    .face-inner::before { bottom:-6px; left:-6px;    border-width:0 0 2px 2px; }
    .face-inner::after  { bottom:-6px; right:-6px;   border-width:0 2px 2px 0; }
    .face-inner { position:relative; width:100%; height:100%; }
    .ring { position:absolute; border-radius:50%; border:1px solid var(--col);
      transition:border-color .5s; pointer-events:none; }
    .ring-1{inset:-14px;opacity:.22;animation:rp 2.3s ease-in-out infinite;}
    .ring-2{inset:-28px;opacity:.12;animation:rp 2.3s ease-in-out infinite .4s;}
    .ring-3{inset:-46px;opacity:.06;animation:rp 2.3s ease-in-out infinite .8s;}
    @keyframes rp{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    #faceSvg { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
    #fxCanvas { position:absolute; inset:0; pointer-events:none; z-index:1; }
    .state-lbl { font-size:15px; font-weight:bold; letter-spacing:4px;
      color:var(--col); transition:color .5s; text-shadow:0 0 14px var(--glow); }
    .texts { text-align:center; max-width:460px; }
    .heard-txt { font-size:13px; color:#5577aa; font-style:italic;
      margin-bottom:8px; min-height:18px; text-shadow:0 0 8px rgba(80,120,180,.35); }
    .resp-txt { font-size:15px; font-weight:bold; letter-spacing:.5px;
      color:var(--col); transition:color .5s; min-height:20px;
      text-shadow:0 0 14px var(--glow); }
    footer { flex-shrink:0; display:flex; align-items:center;
      justify-content:space-between; padding:9px 32px;
      border-top:1px solid rgba(30,110,255,.16);
      background:linear-gradient(0deg,rgba(5,5,20,.92) 0%,transparent 100%); }
    .pi-info { display:flex; align-items:center; gap:20px; font-size:11px; }
    .pi-block { display:flex; align-items:center; gap:7px; }
    .pi-dot { width:8px; height:8px; border-radius:50%; background:#ff4444;
      transition:background .4s,box-shadow .4s; }
    .pi-dot.on { background:#00ff88; box-shadow:0 0 8px #00ff88; }
    .pi-label{color:#253040;} .pi-val{color:var(--col);transition:color .5s;}
    .pi-ping{color:#253040;} .pi-ping.fast{color:#00ff88;}
    .pi-ping.slow{color:#ffaa00;} .pi-ping.dead{color:#ff4444;}
    .keys { display:flex; gap:10px; align-items:center; }
    .key { display:inline-flex; align-items:center; justify-content:center;
      min-width:26px; height:22px; padding:0 5px;
      border:1px solid rgba(30,110,255,.32);
      color:var(--col); font-size:11px; font-weight:bold;
      transition:color .5s,border-color .5s; }
    .key.active { background:var(--col); color:#000; }
    .key-desc { font-size:10px; color:#253040; margin-right:6px; }
    .conn-warn { position:fixed; top:13px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:2px; color:#ff6644;
      opacity:0; transition:opacity .4s; pointer-events:none; z-index:1000; }
    .conn-warn.show{opacity:1;}
  </style>
</head>
<body>
<div class="scan-beam"></div>
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-name">SPECTRALOOP</div>
      <div class="brand-sub">SAMSUN ÜNİVERSİTESİ</div>
    </div>
    <div class="center-title"><h1>SPECTRA</h1><p>SESLİ ARAÇ ASİSTANI</p></div>
    <div class="badge">
      <div class="badge-main">TEKNOFEST</div>
      <div class="badge-sub">HYPERLOOP · 2025</div>

  </header>

  <div class="content">
    <div class="face-wrap">
      <div class="face-inner" id="faceInner">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>

        <!-- ══════════ SPECTRA YÜZÜ — GERÇEKÇİ SVG ══════════ -->
        <svg id="faceSvg" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Yüz kırpma maskesi -->
          <clipPath id="faceClip">
            <ellipse cx="190" cy="190" rx="118" ry="138"/>
          </clipPath>
          <!-- Baş kırpma -->
          <clipPath id="headClip">
            <ellipse cx="190" cy="190" rx="130" ry="150"/>
          </clipPath>

          <!-- Ten — ana ışık sol üstten -->
          <radialGradient id="skinBase" cx="38%" cy="25%" r="78%">
            <stop offset="0%"   stop-color="#fce8cc"/>
            <stop offset="30%"  stop-color="#f0c898"/>
            <stop offset="70%"  stop-color="#d4986a"/>
            <stop offset="100%" stop-color="#b87248"/>
          </radialGradient>
          <!-- Ten yan gölge (sağ taraf karardır) -->
          <radialGradient id="skinShadow" cx="85%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#8a5030" stop-opacity="0.30"/>
            <stop offset="100%" stop-color="#8a5030" stop-opacity="0"/>
          </radialGradient>
          <!-- Alt çene gölgesi -->
          <radialGradient id="chinShadow" cx="50%" cy="100%" r="45%">
            <stop offset="0%"   stop-color="#5a3018" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="#5a3018" stop-opacity="0"/>
          </radialGradient>

          <!-- İris gradyanları -->
          <radialGradient id="irisL" cx="35%" cy="28%" r="75%">
            <stop offset="0%"   stop-color="#a0e0ff"/>
            <stop offset="25%"  stop-color="#3898e8"/>
            <stop offset="60%"  stop-color="#0848b0"/>
            <stop offset="100%" stop-color="#001840"/>
          </radialGradient>
          <radialGradient id="irisR" cx="35%" cy="28%" r="75%">
            <stop offset="0%"   stop-color="#a0e0ff"/>
            <stop offset="25%"  stop-color="#3898e8"/>
            <stop offset="60%"  stop-color="#0848b0"/>
            <stop offset="100%" stop-color="#001840"/>
          </radialGradient>

          <!-- Dudak gradyanları -->
          <linearGradient id="lipUp" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#d07080"/>
            <stop offset="55%"  stop-color="#b05060"/>
            <stop offset="100%" stop-color="#903848"/>
          </linearGradient>
          <linearGradient id="lipDn" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#d88090"/>
            <stop offset="50%"  stop-color="#c06070"/>
            <stop offset="100%" stop-color="#a04858"/>
          </linearGradient>

          <!-- Saç gradyanı -->
          <linearGradient id="hairGrad" x1="0.3" y1="0" x2="0.7" y2="1">
            <stop offset="0%"   stop-color="#1a1030"/>
            <stop offset="40%"  stop-color="#0d0820"/>
            <stop offset="100%" stop-color="#060410"/>
          </linearGradient>
          <linearGradient id="hairSheen" x1="0.2" y1="0" x2="0.6" y2="0.5">
            <stop offset="0%"   stop-color="#4a3870" stop-opacity="0.45"/>
            <stop offset="60%"  stop-color="#2a1850" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#2a1850" stop-opacity="0"/>
          </linearGradient>

          <!-- Glow/blur filtreleri -->
          <filter id="softBlur">
            <feGaussianBlur stdDeviation="3.5"/>
          </filter>
          <filter id="tinyBlur">
            <feGaussianBlur stdDeviation="1.5"/>
          </filter>
          <filter id="eyeGlowFx" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="lipBlur">
            <feGaussianBlur stdDeviation="1"/>
          </filter>
        </defs>

        <!-- ── SAÇ ARKAPLAN ── -->
        <ellipse cx="190" cy="162" rx="130" ry="132" fill="url(#hairGrad)"/>
        <!-- Saç üst hacim -->

        <!-- Saç yan akışlar -->

        <path d="M 320 178 C 328 248 326 308 318 344 C 302 306 316 246 320 178"

        <!-- Saç parlaması -->
        <path d="M 108 42 C 132 28 162 22 188 26" stroke="url(#hairSheen)"

        <path d="M 140 30 C 165 22 192 20 212 26" stroke="url(#hairSheen)"

        <!-- ── BOYUN ── -->

        <!-- Boyun yan gölgeleri -->

        <!-- ── BAŞ BEYZI ── -->
        <ellipse cx="190" cy="190" rx="118" ry="138" fill="url(#skinBase)"/>

        <!-- ── YÜZÜN İÇİ (kırpılmış) ── -->
        <g clip-path="url(#faceClip)">
          <!-- Sağ taraf gölgesi -->
          <ellipse cx="190" cy="190" rx="118" ry="138" fill="url(#skinShadow)"/>
          <!-- Alt çene gölgesi -->
          <ellipse cx="190" cy="190" rx="118" ry="138" fill="url(#chinShadow)"/>
          <!-- Alın sol parlama -->
          <ellipse cx="168" cy="108" rx="52" ry="34" fill="white" opacity="0.11"/>

        <!-- Limbal halka -->

        <path d="M 205 180 C 218 161 252 161 265 180"

        <ellipse id="blinkR" cx="235" cy="180" rx="30" ry="0" fill="#e8c090"/>

        <!-- ── BURUN ── -->

          <line x1="294" y1="200" x2="294" y2="218"/>
          <line x1="294" y1="218" x2="305" y2="218"/>
          <circle cx="305" cy="218" r="2.2" fill="#1e6eff" stroke="none"/>

      <span class="pi-label">Son: <span class="pi-val" id="piLast">—</span></span>
    </div>

      <span class="key" id="keyS">S</span><span class="key-desc">Konuş</span>
      <span class="key" id="keyR">R</span><span class="key-desc">Sıfırla</span>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  CANVAS — ÇEVRE EFEKTLERİ
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('fxCanvas');
const ctx    = canvas.getContext('2d');
const CX = 190, CY = 190, FR = 148;

const STATE_RGB = {
  idle:      [30, 110, 255],
  listening: [0,  255, 200],
  thinking:  [255,170,   0],
  speaking:  [220,235, 255],
};
const STATE_HEX = {
  idle:      '#1e6eff',
  listening: '#00ffc8',
  thinking:  '#ffaa00',
  speaking:  '#c8e0ff',
};
const STATE_LABEL = {
  idle:      '● BEKLİYOR',
  listening: '◉ DİNLİYOR',
  thinking:  '◌ DÜŞÜNÜYOR',
  speaking:  '◎ KONUŞUYOR',
};

let state = 'idle', curRGB = [...STATE_RGB.idle];
let frame = 0, pulse = 0, thinkDot = 0;

const lerp = (a,b,t) => a.map((v,i)=>v+(b[i]-v)*t);
const rgb  = c=>`rgb(${c.map(Math.round).join(',')})`;
const rgba = (c,a)=>`rgba(${c.map(Math.round).join(',')},${a})`;

function update() {
  frame++;
  pulse    = Math.sin(frame*0.048)*0.5+0.5;
  curRGB   = lerp(curRGB, STATE_RGB[state], 0.07);
  thinkDot = Math.floor(frame/10)%3;
}
function draw() {
  ctx.clearRect(0,0,380,380);
  const c = curRGB;
  ctx.beginPath(); ctx.arc(CX,CY,FR+14+pulse*12,0,Math.PI*2);
  ctx.strokeStyle=rgba(c,0.18); ctx.lineWidth=1.5; ctx.stroke();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, len=i%2===0?10:5;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(a)*(FR+1),   CY+Math.sin(a)*(FR+1));
    ctx.lineTo(CX+Math.cos(a)*(FR+len+1),CY+Math.sin(a)*(FR+len+1));
    ctx.strokeStyle=rgba(c,0.5); ctx.lineWidth=1.5; ctx.stroke();
  }
  if(state==='thinking')  drawThinking(c);
  if(state==='listening') drawWave(c);
}
function drawThinking(c) {
  for(let i=0;i<3;i++){
    const a=-Math.PI/2+i*2*Math.PI/3+frame*0.048;
    const x=CX+Math.cos(a)*(FR+30), y=CY+Math.sin(a)*(FR+30);
    ctx.beginPath(); ctx.arc(x,y,i===thinkDot?7:3.5,0,Math.PI*2);
    ctx.fillStyle=i===thinkDot?rgb(c):rgba(c,0.25); ctx.fill();
  }
}
function drawWave(c) {
  const wY=CY+FR+22, wW=260;
  ctx.beginPath();
  for(let i=0;i<64;i++){
    const x=CX-wW/2+i*(wW/63);
    const a=9*Math.sin(i*0.36+frame*0.28)+4*Math.sin(i*0.82+frame*0.5);
    i===0?ctx.moveTo(x,wY+a):ctx.lineTo(x,wY+a);
  }
  ctx.strokeStyle=rgb(c); ctx.lineWidth=2; ctx.stroke();
}
function syncCSS() {
  const h=`rgb(${curRGB.map(Math.round).join(',')})`;
  const g=`rgba(${curRGB.map(Math.round).join(',')},0.4)`;
  document.documentElement.style.setProperty('--col', h);
  document.documentElement.style.setProperty('--glow',g);
}

// ═══════════════════════════════════════════════════════════
//  YÜZ ANİMASYONU
// ═══════════════════════════════════════════════════════════
const $ = id=>document.getElementById(id);
const sa = (el,attr,val)=>el&&el.setAttribute(attr,val);

// Elemanlar
const holoT   = $('holoTint'),   faceOut = $('faceOutline');
const blinkL  = $('blinkL'),     blinkR  = $('blinkR');
const iLiris  = $('iL_iris'),    iRiris  = $('iR_iris');
const iLpupil = $('iL_pupil'),   iRpupil = $('iR_pupil');
const iLlimb  = $('iL_limbal'),  iRlimb  = $('iR_limbal');
const iLhl1   = $('iL_hl1'),     iRhl1   = $('iR_hl1');
const iLhl2   = $('iL_hl2'),     iRhl2   = $('iR_hl2');
const iLfib   = $('iL_fibers'),  iRfib   = $('iR_fibers');
const glowL   = $('glowL'),      glowR   = $('glowR');
const mInner  = $('mouthInner'), tTop    = $('teethTop');
const tBot    = $('teethBot'),   tong    = $('tongueEl');
const tLines  = $('toothLines');
const scanD   = $('scanDot'),    scanRn  = $('scanRing');
const techL   = $('techL'),      techR   = $('techR');

let mAmt=0, mTgt=0;
let bAmt=0, bDir=0, bTmr=160+Math.random()*140;
let lkX=0, lkY=0, lkXs=0, lkYs=0, lkTmr=0;

function animateFace() {
  const fc = STATE_HEX[state] || STATE_HEX.idle;

  // AĞIZ
  if(state==='speaking'){
    mTgt = Math.max(0,
      0.20
      + Math.sin(frame*0.32)*0.42
      + Math.sin(frame*0.21)*0.22
      + Math.sin(frame*0.13)*0.10
    );
  } else { mTgt=0; }
  mAmt += (mTgt-mAmt)*0.22;

  const mRy=(mAmt*14).toFixed(2);
  sa(mInner,'ry',mRy);
  sa(mInner,'cy',(279+mAmt*5).toFixed(2));
  sa(tTop,  'ry',(mAmt*8).toFixed(2));
  sa(tBot,  'ry',(mAmt*6).toFixed(2));
  sa(tong,  'ry',(mAmt*5).toFixed(2));
  // Diş çizgileri
  if(tLines) tLines.setAttribute('opacity', (mAmt*0.55).toFixed(2));

  // GÖZ KIRPMA
  bTmr--;
  if(bTmr<=0){ bTmr=150+Math.random()*190; bDir=1; bAmt=0; }
  if(bDir===1){ bAmt=Math.min(1,bAmt+0.3); if(bAmt>=1)bDir=-1; }
  else if(bDir===-1){ bAmt=Math.max(0,bAmt-0.3); if(bAmt<=0)bDir=0; }
  const bRy=(bAmt*18.5).toFixed(2);
  sa(blinkL,'ry',bRy); sa(blinkR,'ry',bRy);

  // GÖZ BAKIŞI
  lkTmr--;
  if(lkTmr<=0){
    lkTmr=85+Math.floor(Math.random()*125);
    const sp=state==='thinking'?6.5:state==='speaking'?2.5:2;
    lkX=(Math.random()-0.5)*sp*2;
    lkY=(Math.random()-0.5)*sp;
  }
  lkXs+=(lkX-lkXs)*0.05; lkYs+=(lkY-lkYs)*0.05;

  const moveEye=(bx,by,iris,pupil,limb,h1,h2)=>{
    const nx=(bx+lkXs).toFixed(2), ny=(by+lkYs).toFixed(2);
    sa(iris, 'cx',nx); sa(iris, 'cy',ny);
    sa(pupil,'cx',nx); sa(pupil,'cy',ny);
    sa(limb, 'cx',nx); sa(limb, 'cy',ny);
    sa(h1,'cx',(bx+lkXs+6).toFixed(2)); sa(h1,'cy',(by+lkYs-6).toFixed(2));
    sa(h2,'cx',(bx+lkXs-6).toFixed(2)); sa(h2,'cy',(by+lkYs+6).toFixed(2));
  };
  moveEye(145,180,iLiris,iLpupil,iLlimb,iLhl1,iLhl2);
  moveEye(235,180,iRiris,iRpupil,iRlimb,iRhl1,iRhl2);

  // GÖZ IŞILTISI
  const ge=(state==='speaking'?(0.48+Math.sin(frame*0.22)*0.38):
            state==='listening'?(0.25+Math.sin(frame*0.09)*0.15):
            state==='thinking' ?(0.16+Math.sin(frame*0.15)*0.12):0).toFixed(3);
  sa(glowL,'opacity',ge); sa(glowL,'stroke',fc);
  sa(glowR,'opacity',ge); sa(glowR,'stroke',fc);

  // HOLOGRAFİK TINT
  sa(holoT,'fill',fc);
  const ta=(state==='speaking' ?(0.12+Math.sin(frame*0.14)*0.05):
            state==='listening'?0.11:
            state==='thinking' ?(0.09+Math.sin(frame*0.08)*0.04):0.06).toFixed(3);
  sa(holoT,'opacity',ta);

  // YÜZ KONTURU
  sa(faceOut,'stroke',fc);
  sa(faceOut,'opacity',(0.28+Math.sin(frame*0.048)*0.11).toFixed(3));

  // TEKNİK DEKORLAR
  const to=(0.24+Math.sin(frame*0.034)*0.09).toFixed(3);
  sa(techL,'stroke',fc); sa(techL,'opacity',to);
  sa(techR,'stroke',fc); sa(techR,'opacity',to);

  // TARAMA NOKTASI
  const da=(state==='thinking'?(0.52+Math.sin(frame*0.30)*0.44):
            state==='idle'    ?(0.25+Math.sin(frame*0.060)*0.17):0.16).toFixed(3);
  sa(scanD,'fill',fc);  sa(scanD,'opacity',da);
  sa(scanRn,'stroke',fc);
}

(function loop(){ update(); draw(); syncCSS(); animateFace(); requestAnimationFrame(loop); })();

// ═══════════════════════════════════════════════════════════
//  GLİTCH
// ═══════════════════════════════════════════════════════════
let glitching=false;
function triggerGlitch(){
  if(glitching)return; glitching=true;
  $('faceInner').classList.add('glitch');
  setTimeout(()=>{ $('faceInner').classList.remove('glitch'); glitching=false; },260);
}

// ═══════════════════════════════════════════════════════════
//  UI GÜNCELLEME
// ═══════════════════════════════════════════════════════════
let prevState='idle';
function setUIState(s){
  if(s!==prevState){ triggerGlitch(); prevState=s; }
  state=s;
  $('stateLbl').textContent=STATE_LABEL[s]||'● BEKLİYOR';
}
function setPiInfo(data){
  if(data.pi_connected!==undefined)
    $('piDot').classList.toggle('on',data.pi_connected);
  if(data.pi_ip)   $('piIp').textContent  =data.pi_ip;
  if(data.pi_last) $('piLast').textContent=data.pi_last;
  if(data.pi_ping!==undefined){
    const el=$('piPing'), ms=data.pi_ping;
    el.textContent=ms>=0?`ping ${ms}ms`:'ping —';
    el.className='pi-ping '+(ms<0?'dead':ms<80?'fast':ms<250?'slow':'dead');
  }
}

// ═══════════════════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════════════════
const warn=$('connWarn');
let socket;
try{
  socket=io('http://localhost:5001',{reconnectionDelay:2000,timeout:5000});
  socket.on('connect',      ()=>warn.classList.remove('show'));
  socket.on('disconnect',   ()=>{ warn.classList.add('show'); setUIState('idle'); });
  socket.on('connect_error',()=>warn.classList.add('show'));
  socket.on('state',data=>{
    if(data.mode) setUIState(data.mode);
    if(data.text) $('respTxt').textContent=data.text;
    setPiInfo(data);
  });
  socket.on('heard',data=>{
    const t=data.text||'';
    $('heardTxt').textContent=t?`"${t}"`:'' ;
  });
  socket.on('cmd_log',data=>{ if(data.cmd) $('piLast').textContent=data.cmd; });
  socket.on('clear',()=>{
    $('heardTxt').textContent='';
    $('respTxt').textContent='';
  });
}catch(e){
  warn.classList.add('show');
  warn.textContent='● socket.io yüklenemedi';
}

// ═══════════════════════════════════════════════════════════
//  KLAVYE — PTT browser'dan (pynput yedek)
// ═══════════════════════════════════════════════════════════
let pttActive=false;
document.addEventListener('keydown',e=>{
  if((e.key==='s'||e.key==='S')&&!pttActive&&!e.repeat){
    pttActive=true;
    $('keyS').classList.add('active');
    if(socket&&socket.connected) socket.emit('ptt_start');
  }
  if((e.key==='r'||e.key==='R')&&!e.repeat){
    $('keyR').classList.add('active');
    setTimeout(()=>$('keyR').classList.remove('active'),200);
    if(socket&&socket.connected) socket.emit('reset_chat');
  }
  if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  }
});
document.addEventListener('keyup',e=>{
  if((e.key==='s'||e.key==='S')&&pttActive){
    pttActive=false;
    $('keyS').classList.remove('active');
    if(socket&&socket.connected) socket.emit('ptt_stop');
  }
});
</script>
