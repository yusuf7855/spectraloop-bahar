<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectra · Spectraloop</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --col:  #1e6eff;
      --glow: rgba(30,110,255,.4);
      --bg:   #131c2e;
    }

    html, body {
      width:100%; height:100%;
      background:var(--bg);
      font-family:'Courier New', Courier, monospace;
      color:#e2e8f0;
      overflow:hidden;
    }

    /* ── Izgara arkaplan ── */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(99,179,237,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,.04) 1px, transparent 1px);
      background-size:56px 56px;
    }

    /* ── Merkezdeki radyal parlaklık ── */
    .bg-radial {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:radial-gradient(ellipse 60% 55% at 50% 52%,
        rgba(30,110,255,.07) 0%, transparent 70%);
    }

    /* ── Layout ── */
    #app {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      width:100vw; height:100vh;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      flex-shrink:0;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding:0 32px;
      height:64px;
      background:rgba(10,14,30,.75);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    /* Sol — Brand */
    .brand {
      display:flex; flex-direction:column; gap:3px;
      min-width:0;
    }
    .brand-name {
      font-size:13px; font-weight:bold; letter-spacing:4px;
      color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand-sep {
      width:28px; height:1px;
      background:linear-gradient(90deg, var(--col), transparent);
      transition:background .5s;
      margin:2px 0;
    }
    .brand-sub {
      font-size:8px; letter-spacing:3px;
      color:#4a6080;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* Orta — Başlık */
    .center-title {
      text-align:center;
      display:flex; flex-direction:column; align-items:center; gap:4px;
    }
    .center-title h1 {
      font-size:clamp(20px, 3vw, 32px);
      font-weight:bold;
      letter-spacing:clamp(8px, 1.5vw, 16px);
      color:#fff;
      text-shadow:0 0 32px rgba(255,255,255,.15), 0 0 60px var(--glow);
      transition:text-shadow .5s;
      white-space:nowrap;
    }
    .header-divider {
      width:100%; height:1px;
      background:linear-gradient(90deg, transparent, var(--col), transparent);
      opacity:.35;
      transition:background .5s;
    }
    .center-title p {
      font-size:clamp(7px, 0.85vw, 10px);
      letter-spacing:clamp(2px, 0.6vw, 5px);
      color:#4a6080;
      white-space:nowrap;
    }

    /* Sağ — Rozet */
    .badge {
      display:flex; flex-direction:column; align-items:flex-end; gap:3px;
      min-width:0;
    }
    .badge-main {
      font-size:13px; font-weight:bold; letter-spacing:4px;
      color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .badge-sep {
      width:28px; height:1px;
      background:linear-gradient(270deg, var(--col), transparent);
      transition:background .5s;
      margin:2px 0;
      align-self:flex-end;
    }
    .badge-sub {
      font-size:8px; letter-spacing:3px;
      color:#4a6080;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ══════════════════════════════════════
       MERKEZ İÇERİK
    ══════════════════════════════════════ */
    .content {
      flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:clamp(14px, 2.5vh, 28px);
      min-height:0; padding:12px;
    }

    /* Durum etiketi — pill badge */
    .state-lbl {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 22px;
      border-radius:100px;
      background:color-mix(in srgb, var(--col) 10%, transparent);
      border:1px solid color-mix(in srgb, var(--col) 30%, transparent);
      font-size:11px; font-weight:bold; letter-spacing:4px;
      color:var(--col);
      text-shadow:0 0 12px var(--glow);
      transition:color .5s, border-color .5s, background .5s;
      white-space:nowrap;
    }

    /* ══════════════════════════════════════
       MASKOT
    ══════════════════════════════════════ */
    .mascot-wrapper {
      position:relative;
      display:flex; align-items:center; justify-content:center;
      --sz: clamp(300px, 48vmin, 460px);
      width:calc(var(--sz) + 40px);
      height:calc(var(--sz) + 40px);
      flex-shrink:0;
    }

    .mascot-logo {
      width:var(--sz); height:var(--sz);
      object-fit:contain;
      position:relative; z-index:2;
      filter:drop-shadow(0 0 clamp(18px,2.5vmin,32px) var(--col));
      transition:filter .5s ease;
      user-select:none; pointer-events:none;
    }

    .wave-ring {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1.5px solid var(--col);
      width:calc(var(--sz) + 8px);
      height:calc(var(--sz) + 8px);
      opacity:0;
      pointer-events:none;
      z-index:1;
    }

    /* ── Idle ── */
    .mascot-wrapper.idle .mascot-logo {
      animation:logo-breathe 3.5s ease-in-out infinite;
    }

    /* ── Dinliyor ── */
    .mascot-wrapper.listening .wave-ring {
      animation:wave-out 1.8s ease-out infinite;
    }
    .mascot-wrapper.listening .ring-2 { animation-delay:.6s; }
    .mascot-wrapper.listening .ring-3 { animation-delay:1.2s; }
    .mascot-wrapper.listening .mascot-logo {
      animation:logo-listen 1.4s ease-in-out infinite;
    }

    /* ── Düşünüyor ── */
    .mascot-wrapper.thinking .mascot-logo {
      animation:logo-think 2s ease-in-out infinite;
    }

    /* ── Konuşuyor ── */
    .mascot-wrapper.speaking .wave-ring {
      animation:wave-out .82s ease-out infinite;
    }
    .mascot-wrapper.speaking .ring-2 { animation-delay:.27s; }
    .mascot-wrapper.speaking .ring-3 { animation-delay:.54s; }
    .mascot-wrapper.speaking .mascot-logo {
      animation:logo-speak .6s ease-in-out infinite;
    }

    @keyframes wave-out {
      0%   { width:calc(var(--sz) + 12px); height:calc(var(--sz) + 12px); opacity:.72; }
      100% { width:calc(var(--sz) * 2.1);  height:calc(var(--sz) * 2.1);  opacity:0;  }
    }
    @keyframes logo-breathe {
      0%,100% { filter:drop-shadow(0 0 20px var(--col));              transform:scale(1);     }
      50%     { filter:drop-shadow(0 0 44px var(--col));              transform:scale(1.025); }
    }
    @keyframes logo-listen {
      0%,100% { filter:drop-shadow(0 0 26px var(--col));              transform:scale(1);     }
      50%     { filter:drop-shadow(0 0 56px var(--col));              transform:scale(1.03);  }
    }
    @keyframes logo-think {
      0%,100% { filter:drop-shadow(0 0 28px var(--col)) brightness(1);   transform:scale(1);    }
      50%     { filter:drop-shadow(0 0 62px var(--col)) brightness(1.3); transform:scale(1.04); }
    }
    @keyframes logo-speak {
      0%,100% { filter:drop-shadow(0 0 30px var(--col));                  transform:scale(1);     }
      50%     { filter:drop-shadow(0 0 74px var(--col)) brightness(1.35); transform:scale(1.05);  }
    }

    /* ══════════════════════════════════════
       METİNLER
    ══════════════════════════════════════ */
    .texts {
      text-align:center;
      max-width:min(520px, 85vw);
      display:flex; flex-direction:column; gap:10px;
    }
    .heard-txt {
      font-size:clamp(11px, 1.4vw, 14px);
      color:#7a9cc0;
      font-style:italic;
      min-height:1.4em;
      line-height:1.5;
    }
    .resp-txt {
      font-size:clamp(13px, 1.6vw, 16px);
      font-weight:bold;
      letter-spacing:.4px;
      color:#e2e8f0;
      min-height:1.4em;
      line-height:1.6;
      text-shadow:0 0 18px var(--glow);
      transition:text-shadow .5s;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:8px;
      padding:0 32px;
      height:48px;
      background:rgba(10,14,30,.75);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,255,255,.06);
    }

    /* Pi bilgisi */
    .pi-info {
      display:flex; align-items:center; gap:16px;
      font-size:10px;
      white-space:nowrap;
    }
    .pi-block { display:flex; align-items:center; gap:6px; }
    .pi-dot {
      width:7px; height:7px; border-radius:50%;
      background:#ff4444;
      transition:background .4s,box-shadow .4s;
      flex-shrink:0;
    }
    .pi-dot.on { background:#00e87a; box-shadow:0 0 6px #00e87a; }
    .pi-label { color:#4a6080; }
    .pi-val   { color:var(--col); transition:color .5s; }
    .pi-ping  { color:#4a6080; }
    .pi-ping.fast { color:#00e87a; }
    .pi-ping.slow { color:#f59e0b; }
    .pi-ping.dead { color:#ff4444; }

    /* Tuş göstergeleri */
    .keys {
      display:flex; gap:8px; align-items:center;
      flex-wrap:nowrap;
    }
    .key-group {
      display:flex; align-items:center; gap:5px;
    }
    .key {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:24px; height:20px; padding:0 5px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:3px;
      color:#94a3b8; font-size:10px; font-weight:bold;
      background:rgba(255,255,255,.04);
      transition:all .25s;
      white-space:nowrap;
    }
    .key.active {
      background:var(--col);
      border-color:var(--col);
      color:#000;
    }
    .key-desc { font-size:9px; color:#4a6080; letter-spacing:1px; }

    /* ── Bağlantı uyarısı ── */
    .conn-warn {
      position:fixed; top:74px; left:50%; transform:translateX(-50%);
      font-size:10px; letter-spacing:2px;
      color:#fff;
      background:rgba(220,60,30,.85);
      backdrop-filter:blur(8px);
      padding:5px 16px; border-radius:100px;
      opacity:0; transition:opacity .4s; pointer-events:none; z-index:1000;
    }
    .conn-warn.show { opacity:1; }

    /* ══════════════════════════════════════
       KÜÇÜK EKRANLAR
    ══════════════════════════════════════ */
    @media (max-height: 600px) {
      header { height:52px; }
      footer { height:40px; }
      .content { gap:10px; }
    }
    @media (max-width: 500px) {
      header { padding:0 16px; gap:8px; }
      footer { padding:0 16px; }
      .brand-sub, .badge-sub { display:none; }
      .pi-ping, .pi-label:not(.pi-block .pi-label) { display:none; }
    }
  </style>
</head>
<body>
<div class="bg-radial"></div>
<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="brand">
      <div class="brand-name">SPECTRALOOP</div>
      <div class="brand-sep" id="brandSep"></div>
      <div class="brand-sub">SAMSUN ÜNİVERSİTESİ</div>
    </div>

    <div class="center-title">
      <h1>SPECTRA</h1>
      <div class="header-divider"></div>
      <p>SESLİ ARAÇ ASİSTANI</p>
    </div>

    <div class="badge">
      <div class="badge-main">TEKNOFEST</div>
      <div class="badge-sep"></div>
      <div class="badge-sub">HYPERLOOP · 2025</div>
    </div>
  </header>

  <!-- ── MERKEZ ── -->
  <div class="content">

    <div class="state-lbl" id="stateLbl">● BEKLİYOR</div>

    <div class="mascot-wrapper idle" id="mascotWrapper">
      <div class="wave-ring ring-1"></div>
      <div class="wave-ring ring-2"></div>
      <div class="wave-ring ring-3"></div>
      <img src="/spectraloop_logo.png" class="mascot-logo" alt="Spectra">
    </div>

    <div class="texts">
      <div class="heard-txt" id="heardTxt"></div>
      <div class="resp-txt"  id="respTxt"></div>
    </div>

  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="pi-info">
      <div class="pi-block">
        <div class="pi-dot" id="piDot"></div>
        <span class="pi-label">Pi</span>
        <span class="pi-val" id="piIp">—</span>
      </div>
      <span class="pi-ping" id="piPing">ping —</span>
      <span class="pi-label">Son:&nbsp;<span class="pi-val" id="piLast">—</span></span>
    </div>

    <div class="keys">
      <div class="key-group">
        <span class="key" id="keyS">S</span>
        <span class="key-desc">Konuş</span>
      </div>
      <div class="key-group">
        <span class="key">R</span>
        <span class="key-desc">Sıfırla</span>
      </div>
      <div class="key-group">
        <span class="key">F</span>
        <span class="key-desc">Tam Ekran</span>
      </div>
      <span class="key">ESC</span>
    </div>
  </footer>

</div>

<div class="conn-warn" id="connWarn">● SUNUCUYA BAĞLANIYOR</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  RENK GEÇİŞİ
// ═══════════════════════════════════════════════════════════════
const STATE_RGB = {
  idle:      [30,  110, 255],
  listening: [34,  224, 214],
  thinking:  [139,  92, 246],
  speaking:  [255,  87, 216],
};
const STATE_LABEL = {
  idle:      '● BEKLİYOR',
  listening: '◉ DİNLİYOR',
  thinking:  '◌ DÜŞÜNÜYOR',
  speaking:  '◎ KONUŞUYOR',
};

let state  = 'idle';
let curRGB = [...STATE_RGB.idle];
const lerpRGB = (a,b,t) => a.map((v,i) => v + (b[i]-v)*t);

function syncCSS() {
  curRGB = lerpRGB(curRGB, STATE_RGB[state], 0.06);
  const h = `rgb(${curRGB.map(Math.round).join(',')})`;
  const g = `rgba(${curRGB.map(Math.round).join(',')},0.4)`;
  document.documentElement.style.setProperty('--col',  h);
  document.documentElement.style.setProperty('--glow', g);
  requestAnimationFrame(syncCSS);
}
syncCSS();

// ═══════════════════════════════════════════════════════════════
//  UI GÜNCELLEME
// ═══════════════════════════════════════════════════════════════
function setUIState(s) {
  state = s;
  document.getElementById('stateLbl').textContent = STATE_LABEL[s] || '● BEKLİYOR';
  const w = document.getElementById('mascotWrapper');
  if (w) w.className = 'mascot-wrapper ' + s;
}

function setPiInfo(data) {
  if (data.pi_connected !== undefined)
    document.getElementById('piDot').classList.toggle('on', data.pi_connected);
  if (data.pi_ip)   document.getElementById('piIp').textContent   = data.pi_ip;
  if (data.pi_last) document.getElementById('piLast').textContent = data.pi_last;
  if (data.pi_ping !== undefined) {
    const el = document.getElementById('piPing');
    const ms = data.pi_ping;
    el.textContent = ms >= 0 ? `ping ${ms}ms` : 'ping —';
    el.className = 'pi-ping ' + (ms < 0 ? 'dead' : ms < 80 ? 'fast' : ms < 250 ? 'slow' : 'dead');
  }
}

// ═══════════════════════════════════════════════════════════════
//  TAM EKRAN (F)
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(() => {});
    else
      document.exitFullscreen().catch(() => {});
  }
});

// ═══════════════════════════════════════════════════════════════
//  PTT (S) + RESET (R)
// ═══════════════════════════════════════════════════════════════
let pttActive = false;
const keyS = document.getElementById('keyS');

document.addEventListener('keydown', e => {
  if ((e.key === 's' || e.key === 'S') && !pttActive && !e.repeat) {
    pttActive = true;
    keyS?.classList.add('active');
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('ptt_start');
  }
  if ((e.key === 'r' || e.key === 'R') && !e.repeat) {
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('reset_chat');
  }
});
document.addEventListener('keyup', e => {
  if ((e.key === 's' || e.key === 'S') && pttActive) {
    pttActive = false;
    keyS?.classList.remove('active');
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('ptt_stop');
  }
});

// ═══════════════════════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════════════════════
const warn = document.getElementById('connWarn');
let socket;

try {
  socket = io('http://localhost:5001', { reconnectionDelay:2000, timeout:5000 });

  socket.on('connect',       () => warn.classList.remove('show'));
  socket.on('disconnect',    () => { warn.classList.add('show'); setUIState('idle'); });
  socket.on('connect_error', () => warn.classList.add('show'));

  socket.on('state', data => {
    if (data.mode) setUIState(data.mode);
    if (data.text) document.getElementById('respTxt').textContent = data.text;
    setPiInfo(data);
  });

  socket.on('heard', data => {
    const t = data.text || '';
    document.getElementById('heardTxt').textContent = t ? `"${t}"` : '';
  });

  socket.on('cmd_log', data => {
    if (data.cmd) document.getElementById('piLast').textContent = data.cmd;
  });

  socket.on('clear', () => {
    document.getElementById('heardTxt').textContent = '';
    document.getElementById('respTxt').textContent  = '';
  });

} catch(e) {
  warn.classList.add('show');
  warn.textContent = '● socket.io yüklenemedi';
}
</script>
</body>
</html>
