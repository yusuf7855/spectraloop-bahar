<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectra · Spectraloop</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --col:  #1e6eff;
      --glow: rgba(30,110,255,.4);
      --bg:   #050515;
    }

    html, body {
      width:100%; height:100%;
      background: var(--bg);
      font-family: 'Courier New', Courier, monospace;
      color:#fff;
      overflow:hidden;
    }

    /* ── Holografik grid ──────────────────────────────────────── */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,212,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.02) 1px, transparent 1px);
      background-size:48px 48px;
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:999; pointer-events:none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.1) 2px, rgba(0,0,0,.1) 4px
      );
    }
    .scan-beam {
      position:fixed; left:0; right:0; height:5px; z-index:998; pointer-events:none;
      background:linear-gradient(transparent, rgba(0,212,255,.05), transparent);
      animation:scan 9s linear infinite;
    }
    @keyframes scan { 0%{top:-5px} 100%{top:100vh} }

    @keyframes crt { 0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.96} 94%{opacity:1} }
    #app { animation: crt 9s infinite; }

    @keyframes glitch {
      0%  { transform:translate(0);         clip-path:none; }
      18% { transform:translate(-3px, 1px); clip-path:inset(8% 0 84% 0); }
      36% { transform:translate( 3px,-1px); clip-path:inset(43% 0 41% 0); }
      54% { transform:translate(-2px, 2px); clip-path:inset(78% 0 7% 0); }
      72% { transform:translate( 1px, 0);   clip-path:none; }
      100%{ transform:translate(0);         clip-path:none; }
    }
    .glitch { animation:glitch .26s steps(1) forwards; }

    /* ── Layout ───────────────────────────────────────────────── */
    #app {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      width:100vw; height:100vh;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:11px 32px 9px;
      border-bottom:1px solid rgba(30,110,255,.16);
      background:linear-gradient(180deg,rgba(5,5,20,.92) 0%,transparent 100%);
    }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand-name {
      font-size:15px; font-weight:bold; letter-spacing:5px;
      color:#ffffff; text-shadow:0 0 16px rgba(255,255,255,.3);
    }
    .brand-sub { font-size:9px; letter-spacing:3px; color:#4a5a70; }
    .center-title { text-align:center; }
    .center-title h1 {
      font-size:30px; font-weight:bold; letter-spacing:14px;
      color:#ffffff; text-shadow:0 0 32px rgba(255,255,255,.25);
    }
    .center-title p { font-size:10px; letter-spacing:4px; color:#4a5a70; margin-top:3px; }
    .badge { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .badge-main {
      font-size:14px; font-weight:bold; letter-spacing:4px;
      color:#ffffff; text-shadow:0 0 14px rgba(255,255,255,.2);
    }
    .badge-sub { font-size:9px; letter-spacing:3px; color:#4a5a70; }

    /* ── İçerik ───────────────────────────────────────────────── */
    .content {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px; min-height:0;
    }

    /* ── Yüz sarmalayıcı ─────────────────────────────────────── */
    .face-wrap {
      position:relative; flex-shrink:0;
      width:380px; height:380px;
    }

    /* Köşe bracket */
    .face-wrap::before,.face-wrap::after,
    .face-inner::before,.face-inner::after {
      content:''; position:absolute;
      width:22px; height:22px;
      border-color:var(--col); border-style:solid;
      transition:border-color .5s; z-index:2;
    }
    .face-wrap::before  { top:-6px;    left:-6px;    border-width:2px 0 0 2px; }
    .face-wrap::after   { top:-6px;    right:-6px;   border-width:2px 2px 0 0; }
    .face-inner::before { bottom:-6px; left:-6px;    border-width:0 0 2px 2px; }
    .face-inner::after  { bottom:-6px; right:-6px;   border-width:0 2px 2px 0; }

    .face-inner { position:relative; width:100%; height:100%; }

    /* Glow halkaları */
    .ring {
      position:absolute; border-radius:50%;
      border:1px solid var(--col); transition:border-color .5s; pointer-events:none;
    }
    .ring-1{ inset:-14px; opacity:.22; animation:rp 2.3s ease-in-out infinite; }
    .ring-2{ inset:-28px; opacity:.12; animation:rp 2.3s ease-in-out infinite .4s; }
    .ring-3{ inset:-46px; opacity:.06; animation:rp 2.3s ease-in-out infinite .8s; }
    @keyframes rp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

    /* ── SVG Maskot ──────────────────────────────────────────── */
    #mascotSVG {
      position:absolute; inset:0;
      width:100%; height:100%;
    }

    /* ── Efekt canvas (üstte, saydam) ───────────────────────── */
    #fxCanvas {
      position:absolute; inset:0;
      pointer-events:none; z-index:1;
    }

    /* ── Durum etiketi ───────────────────────────────────────── */
    .state-lbl {
      font-size:15px; font-weight:bold; letter-spacing:4px;
      color:var(--col); transition:color .5s;
      text-shadow:0 0 14px var(--glow);
    }

    /* ── Metinler ─────────────────────────────────────────────── */
    .texts { text-align:center; max-width:460px; }
    .heard-txt {
      font-size:13px; color:#5577aa; font-style:italic;
      margin-bottom:8px; min-height:18px;
      text-shadow:0 0 8px rgba(80,120,180,.35);
    }
    .resp-txt {
      font-size:15px; font-weight:bold; letter-spacing:.5px;
      color:var(--col); transition:color .5s; min-height:20px;
      text-shadow:0 0 14px var(--glow);
    }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 32px;
      border-top:1px solid rgba(30,110,255,.16);
      background:linear-gradient(0deg,rgba(5,5,20,.92) 0%,transparent 100%);
    }
    .pi-info { display:flex; align-items:center; gap:20px; font-size:11px; }
    .pi-block { display:flex; align-items:center; gap:7px; }
    .pi-dot {
      width:8px; height:8px; border-radius:50%;
      background:#ff4444;
      transition:background .4s,box-shadow .4s;
    }
    .pi-dot.on { background:#00ff88; box-shadow:0 0 8px #00ff88; }
    .pi-label { color:#253040; }
    .pi-val   { color:var(--col); transition:color .5s; }
    .pi-ping  { color:#253040; }
    .pi-ping.fast { color:#00ff88; }
    .pi-ping.slow { color:#ffaa00; }
    .pi-ping.dead { color:#ff4444; }
    .keys { display:flex; gap:10px; align-items:center; }
    .key {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:26px; height:22px; padding:0 5px;
      border:1px solid rgba(30,110,255,.32);
      color:var(--col); font-size:11px; font-weight:bold;
      transition:color .5s,border-color .5s;
    }
    .key-desc { font-size:10px; color:#253040; margin-right:6px; }

    .conn-warn {
      position:fixed; top:13px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:2px; color:#ff6644;
      opacity:0; transition:opacity .4s; pointer-events:none; z-index:1000;
    }
    .conn-warn.show { opacity:1; }
  </style>
</head>
<body>
<div class="scan-beam"></div>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-name">SPECTRALOOP</div>

          <!-- Tarama göstergesi (JS ile hareket eder) -->

          <rect x="213" y="131" width="78" height="6" rx="3"

          <rect id="scanR" x="253" y="133" width="12" height="18" rx="3"

          <!-- İç koyu alan -->

          <rect x="315" y="160" width="4" height="46" rx="2"

          <!-- ── ÜST DETAYLAR (anten/sensör) ─────────────────── -->

                fill="#070d1c" stroke="#0d2040" stroke-width="1.5"/>
          <rect x="172" y="22" width="36" height="4" rx="2" fill="#0d2040"/>
          <!-- Anten nokta (nabız yapar) -->
          <circle id="antDot" cx="190" cy="19" r="5"
                  fill="#020810" stroke="var(--col)" stroke-width="1.5"/>

          <!-- Alın aksan çizgisi -->
          <line x1="118" y1="88" x2="262" y2="88"
                stroke="rgba(30,110,255,.18)" stroke-width="1"/>
          <line x1="138" y1="94" x2="242" y2="94"
                stroke="rgba(30,110,255,.08)" stroke-width="1"/>

          <!-- ── ÇENE DETAYLARI ───────────────────────────────── -->
          <rect x="155" y="298" width="70" height="7" rx="3"
                fill="#0a1a30" stroke="#0d2040" stroke-width="1"/>
          <rect x="168" y="308" width="44" height="3" rx="1"

          <rect x="178" y="313" width="24" height="2" rx="1"

        </svg>
        <!-- ══════════════════════════════════════════════════════ -->

        <!-- Peripheral efektler (dalga, düşünme noktaları) -->
        <canvas id="fxCanvas" width="380" height="380"></canvas>
      </div>
    </div>

    <div class="state-lbl" id="stateLbl">● BEKLİYOR</div>

    <div class="texts">
      <div class="heard-txt" id="heardTxt"></div>
      <div class="resp-txt"  id="respTxt"></div>
    </div>
  </div>

  <footer>
    <div class="pi-info">
      <div class="pi-block">
        <div class="pi-dot" id="piDot"></div>
        <span class="pi-label">Pi</span>
        <span class="pi-val" id="piIp">—</span>
      </div>
      <span class="pi-ping" id="piPing">ping —</span>
      <span class="pi-label">Son: <span class="pi-val" id="piLast">—</span></span>
    </div>
    <div class="keys">
      <span class="key" id="keyS">S</span><span class="key-desc">Konuş</span>
      <span class="key">R</span><span class="key-desc">Sıfırla</span>
      <span class="key">F</span><span class="key-desc">Tam Ekran</span>
      <span class="key">ESC</span>
    </div>
  </footer>
</div>

<div class="conn-warn" id="connWarn">● SUNUCUYA BAĞLANIYOR...</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS — ÇEVRE EFEKTLERİ (dalga, düşünme, nabız)
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('fxCanvas');
const ctx    = canvas.getContext('2d');
const CX = 190, CY = 188, FR = 155;

const STATE_RGB = {
  idle:      [30,  110, 255],
  listening: [0,   255, 200],
  thinking:  [255, 170,   0],
  speaking:  [220, 235, 255],
};
const STATE_LABEL = {
  idle:      '● BEKLİYOR',
  listening: '◉ DİNLİYOR',
  thinking:  '◌ DÜŞÜNÜYOR',
  speaking:  '◎ KONUŞUYOR',
};

let state    = 'idle';
let curRGB   = [...STATE_RGB.idle];
let frame    = 0;
let pulse    = 0;
let thinkDot = 0;

const lerpRGB = (a,b,t) => a.map((v,i) => v+(b[i]-v)*t);
const rgb     = c => `rgb(${c.map(Math.round).join(',')})`;
const rgba    = (c,a) => `rgba(${c.map(Math.round).join(',')},${a})`;

function update() {
  frame++;
  pulse    = Math.sin(frame * 0.048) * 0.5 + 0.5;
  curRGB   = lerpRGB(curRGB, STATE_RGB[state], 0.07);
  thinkDot = Math.floor(frame / 10) % 3;
}

function draw() {
  ctx.clearRect(0, 0, 380, 380);
  const c = curRGB;

  const pr = FR + 14 + pulse * 12;
  ctx.beginPath(); ctx.arc(CX, CY, pr, 0, Math.PI * 2);
  ctx.strokeStyle = rgba(c, 0.18);
  ctx.lineWidth = 1.5; ctx.stroke();

  for (let i = 0; i < 8; i++) {
    const a   = i * Math.PI / 4;
    const len = i % 2 === 0 ? 10 : 5;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a) * (FR + 1), CY + Math.sin(a) * (FR + 1));
    ctx.lineTo(CX + Math.cos(a) * (FR + len + 1), CY + Math.sin(a) * (FR + len + 1));
    ctx.strokeStyle = rgba(c, 0.5);
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  if (state === 'thinking')  drawThinking(c);
  if (state === 'listening') drawWave(c);
}

function drawThinking(c) {
  for (let i = 0; i < 3; i++) {
    const a = -Math.PI / 2 + i * 2 * Math.PI / 3 + frame * 0.048;
    const x = CX + Math.cos(a) * (FR + 30);
    const y = CY + Math.sin(a) * (FR + 30);
    const r = i === thinkDot ? 7 : 3.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = i === thinkDot ? rgb(c) : rgba(c, 0.25);
    ctx.fill();
  }
}

function drawWave(c) {
  const wY = CY + FR + 18, wW = 250;
  ctx.beginPath();
  for (let i = 0; i < 64; i++) {
    const x   = CX - wW / 2 + i * (wW / 63);
    const amp = 9 * Math.sin(i * 0.36 + frame * 0.28)
              + 4 * Math.sin(i * 0.82 + frame * 0.5);
    i === 0 ? ctx.moveTo(x, wY + amp) : ctx.lineTo(x, wY + amp);
  }
  ctx.strokeStyle = rgb(c); ctx.lineWidth = 2; ctx.stroke();
}

function syncCSS() {
  const h = `rgb(${curRGB.map(Math.round).join(',')})`;
  const g = `rgba(${curRGB.map(Math.round).join(',')},0.4)`;
  document.documentElement.style.setProperty('--col',  h);
  document.documentElement.style.setProperty('--glow', g);
}

// ═══════════════════════════════════════════════════════════════
//  AĞIZ ANİMASYONU — Türkçe heceden LipSync
// ═══════════════════════════════════════════════════════════════
// Türkçe sesli harfler: açık sesli (a,e,o,ö) → büyük açılma
//                       kapalı sesli (ı,i,u,ü) → küçük açılma
const VOWELS_RE      = /[aeıioöuüAEIİOÖUÜ]/g;
const OPEN_VOWELS    = new Set('aeAEoöOÖ');

// SVG elemanları
const elMT = document.getElementById('mouthTop');
const elMB = document.getElementById('mouthBot');
const elMG = document.getElementById('mouthGlow');

// Kapalı konum: her iki dudak da y=238, h=6 → üst üste = kapalı
const MT_CLOSE_Y = 238;
const MB_CLOSE_Y = 238;
const MT_OPEN_DY = 14;   // üst dudak kaç px yukarı çıkar (max)
const MB_OPEN_DY = 15;   // alt dudak kaç px aşağı iner (max)
const LIP_H_CLOSE = 6;
const LIP_H_OPEN  = 9;   // açıkken dudak kalınlaşır

let mouthTimeline = [];  // [{t: ms, open: 0..1}]
let mouthStart    = 0;
let mouthTarget   = 0;
let mouthCurrent  = 0;   // 0=kapalı, 1=tamamen açık

// TTS hızı 190wpm, ortalama Türkçe kelimede ~2.5 sesli harf
// → ~475 hece/dk → ~7.9 hece/sn → ~127ms/hece
const MS_PER_SYLLABLE = 130;

function scheduleSpeech(text) {
  mouthTimeline = [];
  if (!text) return;
  const vowels = [...text.matchAll(VOWELS_RE)];
  if (!vowels.length) return;

  vowels.forEach((m, i) => {
    const t     = i * MS_PER_SYLLABLE;
    const big   = OPEN_VOWELS.has(m[0]);
    const open  = big
      ? 0.55 + Math.random() * 0.45   // açık sesli → %55–100
      : 0.15 + Math.random() * 0.30;  // kapalı sesli → %15–45
    mouthTimeline.push({ t,       open });
    mouthTimeline.push({ t: t+70, open: 0 });   // kısa kapan
  });

  mouthStart = performance.now();
}

function tickMouth() {
  // Timeline tüketimi
  if (state === 'speaking' && mouthTimeline.length) {
    const elapsed = performance.now() - mouthStart;
    while (mouthTimeline.length && mouthTimeline[0].t <= elapsed) {
      mouthTarget = mouthTimeline.shift().open;
    }
  } else {
    mouthTarget = 0;
  }

  // Yumuşak lerp
  mouthCurrent += (mouthTarget - mouthCurrent) * 0.28;
  const t = mouthCurrent;

  // SVG güncelle
  elMT.setAttribute('y',      MT_CLOSE_Y - t * MT_OPEN_DY);
  elMT.setAttribute('height', LIP_H_CLOSE + t * (LIP_H_OPEN - LIP_H_CLOSE));
  elMB.setAttribute('y',      MB_CLOSE_Y + t * MB_OPEN_DY);
  elMB.setAttribute('height', LIP_H_CLOSE + t * (LIP_H_OPEN - LIP_H_CLOSE));
  elMG.setAttribute('opacity', t * 0.55);
}

// ═══════════════════════════════════════════════════════════════
//  GÖZ & MASKOT ANİMASYONU
// ═══════════════════════════════════════════════════════════════
const elScanL = document.getElementById('scanL');
const elScanR = document.getElementById('scanR');
const elAntDot = document.getElementById('antDot');
const EYE_L_X = 89, EYE_R_X = 213, EYE_W = 78, SCAN_W = 12;

let scanPos   = 0;   // 0..EYE_W-SCAN_W
let blinkTimer = 0;  // kare sayacı, dolunca kırpış
let blinkAmt  = 0;   // 0=açık, 1=kapalı

function tickEyes() {
  // Tarama hızı state'e göre değişir
  const speed = state === 'thinking' ? 2.8
              : state === 'speaking' ? 1.6
              : 0.9;
  scanPos = (scanPos + speed) % (EYE_W - SCAN_W);
  elScanL.setAttribute('x', EYE_L_X + scanPos);
  elScanR.setAttribute('x', EYE_R_X + scanPos);

  // Göz kırpma: her ~220 kare bir kırpar (~3.7sn @60fps)
  blinkTimer++;
  if (blinkTimer >= 220) {
    blinkAmt = Math.min(blinkAmt + 0.18, 1);
    if (blinkAmt >= 1) blinkTimer = 0;
  } else {
    blinkAmt = Math.max(blinkAmt - 0.12, 0);
  }
  // Kırparken göz yüksekliği küçülür
  const eyeH = Math.round(22 * (1 - blinkAmt * 0.88));
  const eyeY = 131 + Math.round(11 * blinkAmt * 0.88);
  document.getElementById('eyeL').setAttribute('height', eyeH);
  document.getElementById('eyeL').setAttribute('y', eyeY);
  document.getElementById('eyeR').setAttribute('height', eyeH);
  document.getElementById('eyeR').setAttribute('y', eyeY);
}

function tickIndicators() {
  // Anten nabzı
  const antPulse = (Math.sin(frame * 0.07) + 1) / 2;
  elAntDot.setAttribute('stroke-opacity', 0.35 + antPulse * 0.65);

  // Sol/sağ panel LED'leri kaskad
  const ids = ['indL0','indL1','indL2','indR0','indR1','indR2'];
  const base = [0.7, 0.35, 0.15, 0.7, 0.35, 0.15];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    const phase = (frame * 0.05 - i * 0.6);
    const op = base[i] + Math.sin(phase) * 0.15;
    el.setAttribute('opacity', Math.max(0, Math.min(1, op)));
  });
}

// ═══════════════════════════════════════════════════════════════
//  ANA RAF DÖNGÜSÜ
// ═══════════════════════════════════════════════════════════════
(function loop() {
  update();
  draw();
  syncCSS();
  tickMouth();
  tickEyes();
  tickIndicators();
  requestAnimationFrame(loop);
})();

// ═══════════════════════════════════════════════════════════════
//  GLITCH
// ═══════════════════════════════════════════════════════════════
let glitching = false;
function triggerGlitch() {
  if (glitching) return;
  glitching = true;
  document.getElementById('faceInner').classList.add('glitch');
  setTimeout(() => {
    document.getElementById('faceInner').classList.remove('glitch');
    glitching = false;
  }, 260);
}

// ═══════════════════════════════════════════════════════════════
//  UI GÜNCELLEME
// ═══════════════════════════════════════════════════════════════
let prevState = 'idle';

function setUIState(s) {
  if (s !== prevState) { triggerGlitch(); prevState = s; }
  state = s;
  document.getElementById('stateLbl').textContent = STATE_LABEL[s] || '● BEKLİYOR';
}

function setPiInfo(data) {
  if (data.pi_connected !== undefined)
    document.getElementById('piDot').classList.toggle('on', data.pi_connected);
  if (data.pi_ip)   document.getElementById('piIp').textContent   = data.pi_ip;
  if (data.pi_last) document.getElementById('piLast').textContent = data.pi_last;
  if (data.pi_ping !== undefined) {
    const el = document.getElementById('piPing');
    const ms = data.pi_ping;
    el.textContent = ms >= 0 ? `ping ${ms}ms` : 'ping —';
    el.className = 'pi-ping ' + (ms < 0 ? 'dead' : ms < 80 ? 'fast' : ms < 250 ? 'slow' : 'dead');
  }
}

// ═══════════════════════════════════════════════════════════════
//  TAM EKRAN (F)
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(() => {});
    else
      document.exitFullscreen().catch(() => {});
  }
});

// ═══════════════════════════════════════════════════════════════
//  BROWSER PTT (S tuşu)
// ═══════════════════════════════════════════════════════════════
let pttActive = false;
document.addEventListener('keydown', e => {
  if ((e.key === 's' || e.key === 'S') && !pttActive && !e.repeat) {
    pttActive = true;
    const ks = document.getElementById('keyS');
    if (ks) { ks.style.background = 'var(--col)'; ks.style.color = '#000'; }
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('ptt_start');
  }
  if ((e.key === 'r' || e.key === 'R') && !e.repeat) {
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('reset_chat');
  }
});
document.addEventListener('keyup', e => {
  if ((e.key === 's' || e.key === 'S') && pttActive) {
    pttActive = false;
    const ks = document.getElementById('keyS');
    if (ks) { ks.style.background = ''; ks.style.color = ''; }
    if (typeof socket !== 'undefined' && socket.connected) socket.emit('ptt_stop');
  }
});

// ═══════════════════════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════════════════════
const warn = document.getElementById('connWarn');
let socket;

try {
  socket = io('http://localhost:5001', { reconnectionDelay: 2000, timeout: 5000 });

  socket.on('connect',       () => warn.classList.remove('show'));
  socket.on('disconnect',    () => { warn.classList.add('show'); setUIState('idle'); });
  socket.on('connect_error', () => warn.classList.add('show'));

  socket.on('state', data => {
    if (data.mode) setUIState(data.mode);
    if (data.text) {
      document.getElementById('respTxt').textContent = data.text;
      // Konuşma başlayınca ağız animasyonu planla
      if (data.mode === 'speaking') scheduleSpeech(data.text);
    }
    setPiInfo(data);
  });

  socket.on('heard', data => {
    const t = data.text || '';
    document.getElementById('heardTxt').textContent = t ? `"${t}"` : '';
  });

  socket.on('cmd_log', data => {
    if (data.cmd) document.getElementById('piLast').textContent = data.cmd;
  });

  socket.on('clear', () => {
    document.getElementById('heardTxt').textContent = '';
    document.getElementById('respTxt').textContent  = '';
  });

} catch (e) {
  warn.classList.add('show');
  warn.textContent = '● socket.io yüklenemedi';
}
</script>
