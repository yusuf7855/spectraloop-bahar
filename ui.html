<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectra · Spectraloop</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --col:  #1e6eff;
      --glow: rgba(30,110,255,.4);
      --bg:   #050515;
    }

    html, body {
      width:100%; height:100%;
      background: var(--bg);
      font-family: 'Courier New', Courier, monospace;
      color:#fff;
      overflow:hidden;
    }

    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,212,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.02) 1px, transparent 1px);
      background-size:48px 48px;
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:999; pointer-events:none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.1) 2px, rgba(0,0,0,.1) 4px
      );
    }
    .scan-beam {
      position:fixed; left:0; right:0; height:5px; z-index:998; pointer-events:none;
      background:linear-gradient(transparent, rgba(0,212,255,.05), transparent);
      animation:scan 9s linear infinite;
    }
    @keyframes scan { 0%{top:-5px} 100%{top:100vh} }
    @keyframes crt  { 0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.96} 94%{opacity:1} }
    #app { animation: crt 9s infinite; }

    @keyframes glitch {
      0%  { transform:translate(0);         clip-path:none; }
      18% { transform:translate(-3px, 1px); clip-path:inset(8% 0 84% 0); }
      36% { transform:translate( 3px,-1px); clip-path:inset(43% 0 41% 0); }
      54% { transform:translate(-2px, 2px); clip-path:inset(78% 0 7% 0); }
      72% { transform:translate( 1px, 0);   clip-path:none; }
      100%{ transform:translate(0);         clip-path:none; }
    }
    .glitch { animation:glitch .26s steps(1) forwards; }

    #app {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      width:100vw; height:100vh;
    }

    header {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:11px 32px 9px;
      border-bottom:1px solid rgba(30,110,255,.16);
      background:linear-gradient(180deg,rgba(5,5,20,.92) 0%,transparent 100%);
    }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand-name { font-size:15px; font-weight:bold; letter-spacing:5px; color:#fff; text-shadow:0 0 16px rgba(255,255,255,.25); }
    .brand-sub  { font-size:9px; letter-spacing:3px; color:#4a5a70; }
    .center-title { text-align:center; }
    .center-title h1 { font-size:30px; font-weight:bold; letter-spacing:14px; color:#fff; text-shadow:0 0 32px rgba(255,255,255,.2); }
    .center-title p  { font-size:10px; letter-spacing:4px; color:#4a5a70; margin-top:3px; }
    .badge { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .badge-main { font-size:14px; font-weight:bold; letter-spacing:4px; color:#fff; text-shadow:0 0 14px rgba(255,255,255,.2); }
    .badge-sub  { font-size:9px; letter-spacing:3px; color:#4a5a70; }

    .content {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px; min-height:0;
    }

    .face-wrap {
      position:relative; flex-shrink:0;
      width:380px; height:380px;
    }
    .face-wrap::before,.face-wrap::after,
    .face-inner::before,.face-inner::after {
      content:''; position:absolute;
      width:22px; height:22px;
      border-color:var(--col); border-style:solid;
      transition:border-color .5s; z-index:2;
    }
    .face-wrap::before  { top:-6px;    left:-6px;    border-width:2px 0 0 2px; }
    .face-wrap::after   { top:-6px;    right:-6px;   border-width:2px 2px 0 0; }
    .face-inner::before { bottom:-6px; left:-6px;    border-width:0 0 2px 2px; }
    .face-inner::after  { bottom:-6px; right:-6px;   border-width:0 2px 2px 0; }

    .face-inner { position:relative; width:100%; height:100%; }

    .ring {
      position:absolute; border-radius:50%;
      border:1px solid var(--col); transition:border-color .5s; pointer-events:none;
    }
    .ring-1{ inset:-14px; opacity:.22; animation:rp 2.3s ease-in-out infinite; }
    .ring-2{ inset:-28px; opacity:.12; animation:rp 2.3s ease-in-out infinite .4s; }
    .ring-3{ inset:-46px; opacity:.06; animation:rp 2.3s ease-in-out infinite .8s; }
    @keyframes rp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

    #faceSvg {
      position:absolute; inset:0;
      width:100%; height:100%;
      z-index:0;
    }

    #fxCanvas {
      position:absolute; inset:0;
      pointer-events:none; z-index:1;
    }

    .state-lbl {
      font-size:15px; font-weight:bold; letter-spacing:4px;
      color:var(--col); transition:color .5s;
      text-shadow:0 0 14px var(--glow);
    }

    .texts { text-align:center; max-width:460px; }
    .heard-txt {
      font-size:13px; color:#5577aa; font-style:italic;
      margin-bottom:8px; min-height:18px;
      text-shadow:0 0 8px rgba(80,120,180,.35);
    }
    .resp-txt {
      font-size:15px; font-weight:bold; letter-spacing:.5px;
      color:var(--col); transition:color .5s; min-height:20px;
      text-shadow:0 0 14px var(--glow);
    }

    footer {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 32px;
      border-top:1px solid rgba(30,110,255,.16);
      background:linear-gradient(0deg,rgba(5,5,20,.92) 0%,transparent 100%);
    }
    .pi-info { display:flex; align-items:center; gap:20px; font-size:11px; }
    .pi-block { display:flex; align-items:center; gap:7px; }
    .pi-dot { width:8px; height:8px; border-radius:50%; background:#ff4444; transition:background .4s,box-shadow .4s; }
    .pi-dot.on { background:#00ff88; box-shadow:0 0 8px #00ff88; }
    .pi-label { color:#253040; }
    .pi-val   { color:var(--col); transition:color .5s; }
    .pi-ping  { color:#253040; }
    .pi-ping.fast { color:#00ff88; }
    .pi-ping.slow { color:#ffaa00; }
    .pi-ping.dead { color:#ff4444; }
    .keys { display:flex; gap:10px; align-items:center; }
    .key {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:26px; height:22px; padding:0 5px;
      border:1px solid rgba(30,110,255,.32);
      color:var(--col); font-size:11px; font-weight:bold;
      transition:color .5s,border-color .5s;
    }
    .key-desc { font-size:10px; color:#253040; margin-right:6px; }
    .conn-warn {
      position:fixed; top:13px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:2px; color:#ff6644;
      opacity:0; transition:opacity .4s; pointer-events:none; z-index:1000;
    }
    .conn-warn.show { opacity:1; }
  </style>
</head>
<body>
<div class="scan-beam"></div>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-name">SPECTRALOOP</div>
      <div class="brand-sub">SAMSUN ÜNİVERSİTESİ</div>
    </div>
    <div class="center-title">

              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

            <filter id="softBlur">
              <feGaussianBlur stdDeviation="2.5"/>

            <!-- Tarama çizgileri dokusu -->
            <ellipse cx="190" cy="188" rx="122" ry="140"
                     fill="none" stroke="rgba(0,0,0,0.035)" stroke-width="3"
                     stroke-dasharray="1 5" opacity="0.6"/>
          </g>

          <!-- ── KAŞLAR ── -->
          <path d="M 96 158 Q 124 146 150 151"

          <path d="M 230 151 Q 256 146 284 158"

          <!-- ══ SOL GÖZ ══ -->

          <ellipse cx="136" cy="182" rx="30" ry="19" fill="white"/>
          <ellipse cx="136" cy="182" rx="28" ry="17" fill="white" opacity="0.6"/>
          <!-- İris -->
          <circle id="irisL" cx="136" cy="182" r="15" fill="url(#irisGrad)"/>
          <!-- Göz bebeği -->
          <circle id="pupilL" cx="136" cy="182" r="7.5" fill="#000818"/>
          <!-- Limbal halka -->
          <circle id="limbalL" cx="136" cy="182" r="15" fill="none" stroke="#08142a" stroke-width="1.2"/>
          <!-- Parlamalar -->
          <circle id="hlL1" cx="143" cy="176" r="4.2" fill="white" opacity="0.92"/>
          <circle id="hlL2" cx="129" cy="187" r="2"   fill="white" opacity="0.42"/>
          <!-- Göz kapağı üst -->
          <path d="M 106 182 Q 136 163 166 182" stroke="#281008" stroke-width="2.5" fill="none"/>
          <!-- Göz kapağı alt -->
          <path d="M 106 182 Q 136 196 166 182" stroke="#c09078" stroke-width="1.4" fill="none"/>
          <!-- Kirpikler üst -->
          <line x1="110" y1="178" x2="106" y2="167" stroke="#180808" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="122" y1="168" x2="119" y2="158" stroke="#180808" stroke-width="1.8" stroke-linecap="round"/>

          <!-- ══ SAĞ GÖZ ══ -->
          <ellipse cx="244" cy="182" rx="30" ry="19" fill="white"/>

          <line x1="244" y1="164" x2="244" y2="154" stroke="#180808" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="258" y1="168" x2="261" y2="158" stroke="#180808" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="270" y1="178" x2="274" y2="167" stroke="#180808" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M 217 175 Q 244 169 271 175"

          <ellipse id="blinkR" cx="244" cy="182" rx="30" ry="0" fill="#d9a87c"/>

          <circle id="glowL" cx="136" cy="182" r="18" fill="none"

          <circle id="glowR" cx="244" cy="182" r="18" fill="none"

          <!-- ── BURUN ── -->

          <!-- Alın tarama noktası -->

                  stroke-width="0.8" opacity="0.28" id="scanRing"/>
        </svg>
        <!-- ══════════════ SPECTRA YÜZÜ SON ══════════════ -->

        <canvas id="fxCanvas" width="380" height="380"></canvas>
      </div>
    </div>

    <div class="state-lbl" id="stateLbl">● BEKLİYOR</div>

    <div class="texts">
      <div class="heard-txt" id="heardTxt"></div>
      <div class="resp-txt"  id="respTxt"></div>
    </div>
  </div>

  <footer>
    <div class="pi-info">
      <div class="pi-block">
        <div class="pi-dot" id="piDot"></div>
        <span class="pi-label">Pi</span>
        <span class="pi-val" id="piIp">—</span>

    <div class="keys">
      <span class="key">S</span><span class="key-desc">Konuş</span>
      <span class="key">R</span><span class="key-desc">Sıfırla</span>
      <span class="key">F</span><span class="key-desc">Tam Ekran</span>
      <span class="key">ESC</span>
    </div>
  </footer>
</div>

<div class="conn-warn" id="connWarn">● SUNUCUYA BAĞLANIYOR...</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS — ÇEVRE EFEKTLERİ
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('fxCanvas');
const ctx    = canvas.getContext('2d');
const CX = 190, CY = 188, FR = 150;

const STATE_RGB = {
  idle:      [30,  110, 255],
  listening: [0,   255, 200],
  thinking:  [255, 170,   0],
  speaking:  [220, 235, 255],
};
const STATE_HEX = {
  idle:      '#1e6eff',
  listening: '#00ffc8',
  thinking:  '#ffaa00',
  speaking:  '#c8e0ff',
};
const STATE_LABEL = {
  idle:      '● BEKLİYOR',
  listening: '◉ DİNLİYOR',
  thinking:  '◌ DÜŞÜNÜYOR',
  speaking:  '◎ KONUŞUYOR',
};

let state    = 'idle';
let curRGB   = [...STATE_RGB.idle];
let frame    = 0;
let pulse    = 0;
let thinkDot = 0;

const lerpRGB = (a,b,t) => a.map((v,i) => v+(b[i]-v)*t);
const rgb  = c => `rgb(${c.map(Math.round).join(',')})`;
const rgba = (c,a) => `rgba(${c.map(Math.round).join(',')},${a})`;

function update() {
  frame++;
  pulse    = Math.sin(frame * 0.048) * 0.5 + 0.5;
  curRGB   = lerpRGB(curRGB, STATE_RGB[state], 0.07);
  thinkDot = Math.floor(frame / 10) % 3;
}

function draw() {
  ctx.clearRect(0, 0, 380, 380);
  const c = curRGB;
  const pr = FR + 14 + pulse * 12;
  ctx.beginPath(); ctx.arc(CX, CY, pr, 0, Math.PI * 2);
  ctx.strokeStyle = rgba(c, 0.18); ctx.lineWidth = 1.5; ctx.stroke();
  for (let i = 0; i < 8; i++) {
    const a   = i * Math.PI / 4;
    const len = i % 2 === 0 ? 10 : 5;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a)*(FR+1), CY + Math.sin(a)*(FR+1));
    ctx.lineTo(CX + Math.cos(a)*(FR+len+1), CY + Math.sin(a)*(FR+len+1));
    ctx.strokeStyle = rgba(c, 0.5); ctx.lineWidth = 1.5; ctx.stroke();
  }
  if (state === 'thinking')  drawThinking(c);
  if (state === 'listening') drawWave(c);
}

function drawThinking(c) {
  for (let i = 0; i < 3; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/3 + frame*0.048;
    const x = CX + Math.cos(a)*(FR+30);
    const y = CY + Math.sin(a)*(FR+30);
    const r = i === thinkDot ? 7 : 3.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = i===thinkDot ? rgb(c) : rgba(c,0.25); ctx.fill();
  }
}

function drawWave(c) {
  const wY = CY + FR + 20, wW = 260;
  ctx.beginPath();
  for (let i = 0; i < 64; i++) {
    const x   = CX - wW/2 + i*(wW/63);
    const amp = 9*Math.sin(i*0.36+frame*0.28) + 4*Math.sin(i*0.82+frame*0.5);
    i===0 ? ctx.moveTo(x, wY+amp) : ctx.lineTo(x, wY+amp);
  }
  ctx.strokeStyle = rgb(c); ctx.lineWidth = 2; ctx.stroke();
}

function syncCSS() {
  const h = `rgb(${curRGB.map(Math.round).join(',')})`;
  const g = `rgba(${curRGB.map(Math.round).join(',')},0.4)`;
  document.documentElement.style.setProperty('--col',  h);
  document.documentElement.style.setProperty('--glow', g);
}

// ═══════════════════════════════════════════════════════════════
//  YÜZ ANİMASYONU
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

// SVG elemanları
const holoTint   = $('holoTint');
const faceOutEl  = $('faceOutline');
const blinkLEl   = $('blinkL');
const blinkREl   = $('blinkR');
const irisLEl    = $('irisL');
const irisREl    = $('irisR');
const pupilLEl   = $('pupilL');
const pupilREl   = $('pupilR');
const limbalLEl  = $('limbalL');
const limbalREl  = $('limbalR');
const glowLEl    = $('glowL');
const glowREl    = $('glowR');
const mouthInner = $('mouthInner');
const teethTop   = $('teethTop');
const teethBot   = $('teethBot');
const tongueEl   = $('tongueEl');
const scanDotEl  = $('scanDot');
const scanRingEl = $('scanRing');
const techLEl    = $('techL');
const techREl    = $('techR');

// Animasyon durumu
let mouthAmt   = 0, mouthTgt = 0;
let blinkAmt   = 0, blinkDir = 0, blinkTimer = 150 + Math.random()*150;
let lookX = 0, lookY = 0, lookXS = 0, lookYS = 0, lookTimer = 0;

function animateFace() {
  const fc = STATE_HEX[state] || STATE_HEX.idle;

  // ── AĞIZ ──
  if (state === 'speaking') {
    mouthTgt = Math.max(0,
      0.18
      + Math.sin(frame * 0.30) * 0.45
      + Math.sin(frame * 0.19) * 0.25
      + Math.sin(frame * 0.11) * 0.12
    );
  } else {
    mouthTgt = 0;
  }
  mouthAmt += (mouthTgt - mouthAmt) * 0.20;

  const mRy = mouthAmt * 13;
  mouthInner.setAttribute('ry', mRy.toFixed(2));
  mouthInner.setAttribute('cy', (279 + mouthAmt*5).toFixed(2));
  teethTop.setAttribute('ry',   (mouthAmt * 7.5).toFixed(2));
  teethBot.setAttribute('ry',   (mouthAmt * 5.5).toFixed(2));
  tongueEl.setAttribute('ry',   (mouthAmt * 4.5).toFixed(2));

  // ── GÖZ KIRPMA ──
  blinkTimer--;
  if (blinkTimer <= 0) {
    blinkTimer = 145 + Math.random()*185;
    blinkDir   = 1;
    blinkAmt   = 0;
  }
  if (blinkDir === 1) {
    blinkAmt = Math.min(1, blinkAmt + 0.28);
    if (blinkAmt >= 1) blinkDir = -1;
  } else if (blinkDir === -1) {
    blinkAmt = Math.max(0, blinkAmt - 0.28);
    if (blinkAmt <= 0) blinkDir = 0;
  }
  const bRy = (blinkAmt * 19).toFixed(2);
  blinkLEl.setAttribute('ry', bRy);
  blinkREl.setAttribute('ry', bRy);

  // ── GÖZ BAKIŞI ──
  lookTimer--;
  if (lookTimer <= 0) {
    lookTimer = 80 + Math.floor(Math.random()*130);
    const spread = state==='thinking' ? 7 : state==='speaking' ? 2.5 : 1.8;
    lookX = (Math.random()-0.5) * spread * 2;
    lookY = (Math.random()-0.5) * spread;
  }
  lookXS += (lookX - lookXS) * 0.05;
  lookYS += (lookY - lookYS) * 0.05;

  const setEyePos = (baseX, baseY, iris, pupil) => {
    const nx = (baseX + lookXS).toFixed(2);
    const ny = (baseY + lookYS).toFixed(2);
    iris.setAttribute('cx',  nx); iris.setAttribute('cy',  ny);
    pupil.setAttribute('cx', nx); pupil.setAttribute('cy', ny);
  };
  setEyePos(136, 182, irisLEl, pupilLEl);
  setEyePos(244, 182, irisREl, pupilREl);

  // ── GÖZ IŞILTISI ──
  const ge = state==='speaking' ? (0.5 + Math.sin(frame*0.20)*0.38) :
             state==='listening'? (0.28+ Math.sin(frame*0.09)*0.15) :
             state==='thinking' ? (0.18+ Math.sin(frame*0.14)*0.12) : 0;
  glowLEl.setAttribute('opacity', ge.toFixed(3));
  glowREl.setAttribute('opacity', ge.toFixed(3));
  glowLEl.setAttribute('stroke', fc);
  glowREl.setAttribute('stroke', fc);

  // ── HOLOGRAFİK RENK TONU ──
  holoTint.setAttribute('fill', fc);
  const ta = state==='speaking'  ? (0.13 + Math.sin(frame*0.13)*0.05) :
             state==='listening' ? 0.12 :
             state==='thinking'  ? (0.10 + Math.sin(frame*0.07)*0.04) : 0.07;
  holoTint.setAttribute('opacity', ta.toFixed(3));

  // ── YÜZ KONTURU ──
  faceOutEl.setAttribute('stroke', fc);
  faceOutEl.setAttribute('opacity', (0.32 + Math.sin(frame*0.046)*0.12).toFixed(3));

  // ── TEKNİK DEKORASYONLAR ──
  const techOp = (0.26 + Math.sin(frame*0.032)*0.10).toFixed(3);
  techLEl.setAttribute('stroke', fc); techLEl.setAttribute('opacity', techOp);
  techREl.setAttribute('stroke', fc); techREl.setAttribute('opacity', techOp);

  // ── TARAMA NOKTASI ──
  const da = state==='thinking'  ? (0.55 + Math.sin(frame*0.28)*0.42) :
             state==='idle'      ? (0.28 + Math.sin(frame*0.058)*0.18) : 0.18;
  scanDotEl.setAttribute('fill',    fc);
  scanDotEl.setAttribute('opacity', da.toFixed(3));
  scanRingEl.setAttribute('stroke', fc);
}

// ═══════════════════════════════════════════════════════════════
//  ANA DÖNGÜ
// ═══════════════════════════════════════════════════════════════
(function loop() {
  update();
  draw();
  syncCSS();
  animateFace();
  requestAnimationFrame(loop);
})();

// ═══════════════════════════════════════════════════════════════
//  GLİTCH
// ═══════════════════════════════════════════════════════════════
let glitching = false;
function triggerGlitch() {
  if (glitching) return;
  glitching = true;
  $('faceInner').classList.add('glitch');
  setTimeout(() => { $('faceInner').classList.remove('glitch'); glitching=false; }, 260);
}

// ═══════════════════════════════════════════════════════════════
//  UI GÜNCELLEME
// ═══════════════════════════════════════════════════════════════
let prevState = 'idle';

function setUIState(s) {
  if (s !== prevState) { triggerGlitch(); prevState = s; }
  state = s;
  $('stateLbl').textContent = STATE_LABEL[s] || '● BEKLİYOR';
}

function setPiInfo(data) {
  if (data.pi_connected !== undefined)
    $('piDot').classList.toggle('on', data.pi_connected);
  if (data.pi_ip)   $('piIp').textContent  = data.pi_ip;
  if (data.pi_last) $('piLast').textContent = data.pi_last;
  if (data.pi_ping !== undefined) {
    const el = $('piPing');
    const ms = data.pi_ping;
    el.textContent = ms >= 0 ? `ping ${ms}ms` : 'ping —';
    el.className   = 'pi-ping ' + (ms<0?'dead':ms<80?'fast':ms<250?'slow':'dead');
  }
}

// ═══════════════════════════════════════════════════════════════
//  TAM EKRAN (F)
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='f'||e.key==='F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  }
});

// ═══════════════════════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════════════════════
const warn = $('connWarn');
try {
  const socket = io('http://localhost:5001', { reconnectionDelay:2000, timeout:5000 });
  socket.on('connect',       () => warn.classList.remove('show'));
  socket.on('disconnect',    () => { warn.classList.add('show'); setUIState('idle'); });
  socket.on('connect_error', () => warn.classList.add('show'));
  socket.on('state', data => {
    if (data.mode) setUIState(data.mode);
    if (data.text) $('respTxt').textContent = data.text;
    setPiInfo(data);
  });
  socket.on('heard', data => {
    const t = data.text||'';
    $('heardTxt').textContent = t ? `"${t}"` : '';
  });
  socket.on('cmd_log', data => {
    if (data.cmd) $('piLast').textContent = data.cmd;
  });
  socket.on('clear', () => {
    $('heardTxt').textContent = '';
    $('respTxt').textContent  = '';
  });
} catch(e) {
  warn.classList.add('show');
  warn.textContent = '● socket.io yüklenemedi';
}
</script>
</body>
</html>
